[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tracegrade-graders"
version = "0.1.0"
description = "Built-in grader implementations for TraceGrade"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.0",
    "anthropic>=0.42",
    "openai>=1.60",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tracegrade_graders"]
